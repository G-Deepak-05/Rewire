services:
  # ─── API ──────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rewire_api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://rewire:rewire@postgres:5432/rewire
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - MAILPIT_HOST=mailpit
      - MAILPIT_PORT=1025
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - rewire_net
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Celery Worker ────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rewire_worker
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://rewire:rewire@postgres:5432/rewire
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - rewire_net
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4

  # ─── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rewire_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: rewire
      POSTGRES_PASSWORD: rewire
      POSTGRES_DB: rewire
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rewire_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rewire -d rewire"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rewire_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - rewire_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    command: redis-server --appendonly yes

  # ─── Mailpit ──────────────────────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: rewire_mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - rewire_net
    restart: unless-stopped

  # ─── Prometheus ───────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: rewire_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - rewire_net
    restart: unless-stopped

  # ─── Grafana ──────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: rewire_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=rewire
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
      - loki
    networks:
      - rewire_net
    restart: unless-stopped

  # ─── Loki ─────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: rewire_loki
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - rewire_net
    restart: unless-stopped

  # ─── Promtail ─────────────────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:latest
    container_name: rewire_promtail
    volumes:
      - ./docker/promtail-config.yaml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - rewire_net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  rewire_net:
    driver: bridge
